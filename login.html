<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ProEarn Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.login-box{

width:100%;
max-width:400px;

background:white;

border-radius:20px;

padding:30px 25px;

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo img{

width:100px;
height:100px;
border-radius:50%;
object-fit:cover;

}

.logo h1{

margin-top:12px;
font-size:30px;
color:#111827;

}

.logo span{

color:#14b8a6;

}

.input-box{

margin-bottom:18px;

}

.input-box input{

width:100%;

padding:15px;

border:2px solid #ddd;

border-radius:12px;

font-size:16px;

outline:none;

}

.main-btn{

width:100%;

padding:15px;

background:#14b8a6;

border:none;

border-radius:12px;

font-size:18px;

color:white;

font-weight:bold;

margin-top:10px;

}

.links{

display:flex;

justify-content:space-between;

margin-top:15px;

font-size:14px;

}

.links a{

text-decoration:none;
color:#2563eb;
cursor:pointer;

}

.google-btn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:bold;

margin-top:20px;

display:flex;

justify-content:center;
align-items:center;
gap:10px;

background:white;
border:2px solid #ddd;

}

.register{

text-align:center;

margin-top:20px;

font-size:15px;

}

.register a{

color:#14b8a6;
text-decoration:none;
font-weight:bold;

}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="https://images.unsplash.com/photo-1606092195730-5d7b9af1efc5?q=80&w=1200&auto=format&fit=crop">

<h1>PRO<span>EARN</span></h1>

</div>

<!-- LOGIN FORM -->

<div id="loginForm">

<div class="input-box">

<input type="email"
id="loginEmail"
placeholder="Email Address">

</div>

<div class="input-box">

<input type="password"
id="loginPassword"
placeholder="Password">

</div>

<button class="main-btn"
onclick="loginUser()">

Login

</button>

<div class="links">

<a onclick="showSignup()">
Register
</a>

<a onclick="forgotPassword()">
Forgot Password
</a>

</div>

<button class="google-btn"
onclick="googleLogin()">

<i class="fa-brands fa-google"></i>

Sign in with Google

</button>

</div>

<!-- SIGNUP FORM -->

<div id="signupForm"
class="hidden">

<div class="input-box">

<input type="email"
id="signupEmail"
placeholder="Email Address">

</div>

<div class="input-box">

<input type="password"
id="signupPassword"
placeholder="Password">

</div>

<button class="main-btn"
onclick="signupUser()">

Sign Up

</button>

<div class="links">

<a onclick="showLogin()">
Login
</a>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

signInWithPopup,

GoogleAuthProvider,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

sendPasswordResetEmail

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDco0KJGaXb-_f80pSSZQ7u6nKE9M9H-hI",

authDomain: "proearn-81989.firebaseapp.com",

projectId: "proearn-81989",

storageBucket: "proearn-81989.firebasestorage.app",

messagingSenderId: "394148226234",

appId: "1:394148226234:web:75456cdd11a2fa32b20e83"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.showSignup = function(){

document.getElementById("loginForm")
.classList.add("hidden");

document.getElementById("signupForm")
.classList.remove("hidden");

}

window.showLogin = function(){

document.getElementById("signupForm")
.classList.add("hidden");

document.getElementById("loginForm")
.classList.remove("hidden");

}

window.signupUser = function(){

const email =
document.getElementById("signupEmail").value;

const password =
document.getElementById("signupPassword").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(() => {

alert("Account Created");

showLogin();

})

.catch((error) => {

alert(error.message);

});

}

window.loginUser = function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(() => {

alert("Login Success");

window.location.href =
"dashboard.html";

})

.catch((error) => {

alert(error.message);

});

}

window.googleLogin = function(){

signInWithPopup(auth, provider)

.then(() => {

alert("Google Login Success");

window.location.href =
"dashboard.html";

})

.catch((error) => {

alert(error.message);

});

}

window.forgotPassword = function(){

const email =
prompt("Enter Your Email");

if(email){

sendPasswordResetEmail(auth, email)

.then(() => {

alert("Password Reset Email Sent");

})

.catch((error) => {

alert(error.message);

});

}

}

</script>

</body>

</html>
