<!DOCTYPE html>
<html lang="en">

<head>

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

*{

padding:0;
box-sizing:border-box;
font-family:Arial;

body{

}

/* HEADER */

.header{

.logo{

.support-box{
background:#131c39;
padding:25px;
border-radius:20px;

.support-box i{
font-size:60px;
color:#25d366;

}

.support-box h2{
margin-bottom:10px;
}

.support-box p{
color:#bbb;
line-height:1.6;
margin-bottom:20px;

/* BUTTON */

.btn{
display:block;
width:100%;
padding:15px;
