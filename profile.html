<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
background:#0b1020;
font-family:Arial;
color:white;
padding:15px;
}

.profile{
background:#131c39;
padding:25px;
border-radius:18px;
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:15px;
}

.box{
background:#131c39;
padding:18px;
border-radius:18px;
margin-top:15px;
}

.logout-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="profile">

<img id="userPhoto"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<h2 id="userName">
Loading...
</h2>

<p id="userEmail">
Loading...
</p>

</div>

<div class="box">
Total Balance: PKR 0
</div>

<div class="box">
Total Referral: 0
</div>

<div class="box">
Total Earn: PKR 0
</div>

<button class="logout-btn"
onclick="logoutUser()">

Logout

</button>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDco0KJGaXb-_f80pSSZQ7u6nKE9M9H-hI",

authDomain: "proearn-81989.firebaseapp.com",

projectId: "proearn-81989",

storageBucket: "proearn-81989.firebasestorage.app",

messagingSenderId: "394148226234",

appId: "1:394148226234:web:75456cdd11a2fa32b20e83"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

onAuthStateChanged(auth,
(user)=>{

if(user){

document.getElementById("userName")
.innerHTML =
user.displayName || "ProEarn User";

document.getElementById("userEmail")
.innerHTML =
user.email;

if(user.photoURL){

document.getElementById("userPhoto")
.src =
user.photoURL;

}

}else{

window.location.href =
"login.html";

}

});

window.logoutUser = function(){

signOut(auth)

.then(()=>{

alert("Logout Success");

window.location.href =
"login.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>

</html>
