<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ProEarn Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b1020;
color:white;
padding:15px;
padding-bottom:90px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:28px;
font-weight:bold;
}

.logo span{
color:#14b8a6;
}

.menu-btn{
font-size:28px;
color:#14b8a6;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:#131c39;
padding:20px;
transition:0.3s;
z-index:1000;
}

.side-menu.active{
left:0;
}

.side-menu h2{
margin-bottom:25px;
}

.side-menu a{
display:block;
color:white;
text-decoration:none;
padding:14px;
background:#1b254b;
border-radius:12px;
margin-bottom:12px;
}

.side-menu a:hover{
background:#14b8a6;
}

/* BALANCE BOX */

.balance-box{
background:#131c39;
padding:25px;
border-radius:22px;
margin-bottom:18px;
}

.balance-box h2{
font-size:18px;
margin-bottom:12px;
color:#bbb;
}

.balance-box h1{
font-size:38px;
margin-bottom:18px;
}

.balance-btns{
display:flex;
gap:10px;
}

.balance-btns button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:bold;
color:white;
}

.deposit-btn{
background:#14b8a6;
}

.withdraw-btn{
background:red;
}

/* INFO BOXES */

.info-box{
background:#131c39;
padding:18px;
border-radius:18px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.info-box h3{
font-size:16px;
color:#bbb;
}

.info-box p{
font-size:22px;
font-weight:bold;
}

/* GAMES */

.games-title{
margin:20px 0 12px;
font-size:22px;
}

.game-card{
background:#131c39;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.game-card img{
width:100%;
border-radius:15px;
margin-bottom:12px;
height:180px;
object-fit:cover;
}

.game-card h2{
margin-bottom:8px;
}

.play-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#14b8a6;
color:white;
font-size:16px;
font-weight:bold;
}

/* BOTTOM MENU */

.bottom-menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#131c39;
display:flex;
justify-content:space-around;
padding:14px 0;
}

.bottom-menu a{
color:white;
text-decoration:none;
font-size:14px;
text-align:center;
}

.bottom-menu i{
display:block;
font-size:22px;
margin-bottom:4px;
}

.active{
color:#14b8a6;
}

</style>

</head>

<body>

<!-- SIDE MENU -->

<div class="side-menu"
id="sideMenu">

<h2>ProEarn Menu</h2>

<a href="dashboard.html">
Home
</a>

<a href="wallet.html">
Wallet
</a>

<a href="games.html">
Games
</a>

<a href="support.html">
Customer Support
</a>

<a href="profile.html">
Profile
</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="logo">
PRO<span>EARN</span>
</div>

<i class="fa-solid fa-bars menu-btn"
onclick="toggleMenu()"></i>

</div>

<!-- BALANCE -->

<div class="balance-box">

<h2>
Current Balance
</h2>

<h1 id="balance">
PKR 0
</h1>

<div class="balance-btns">

<button class="deposit-btn">
Deposit
</button>

<button class="withdraw-btn">
Withdraw
</button>

</div>

</div>

<!-- INFO -->

<div class="info-box">

<h3>
Total Earn
</h3>

<p id="earn">
PKR 0
</p>

</div>

<div class="info-box">

<h3>
Total Referral
</h3>

<p id="referral">
0
</p>

</div>

<!-- GAMES -->

<h2 class="games-title">
Popular Games
</h2>

<div class="game-card">

<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">

<h2>
Ludo Game
</h2>

<button class="play-btn">
Play Now
</button>

</div>

<div class="game-card">

<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">

<h2>
Aviator Game
</h2>

<button class="play-btn">
Play Now
</button>

</div>

<!-- BOTTOM MENU -->

<div class="bottom-menu">

<a href="dashboard.html"
class="active">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="wallet.html">

<i class="fa-solid fa-wallet"></i>

Wallet

</a>

<a href="games.html">

<i class="fa-solid fa-gamepad"></i>

Games

</a>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

Profile

</a>

</div>

<!-- MENU SCRIPT -->

<script>

function toggleMenu(){

document.getElementById("sideMenu")
.classList.toggle("active");

}

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDco0KJGaXb-_f80pSSZQ7u6nKE9M9H-hI",

authDomain: "proearn-81989.firebaseapp.com",

projectId: "proearn-81989",

storageBucket: "proearn-81989.firebasestorage.app",

messagingSenderId: "394148226234",

appId: "1:394148226234:web:75456cdd11a2fa32b20e83"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

onAuthStateChanged(auth,
async(user)=>{

if(user){

const userRef =
doc(db,"users",user.uid);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

await setDoc(userRef,{

name:
user.displayName || "ProEarn User",

email:
user.email,

balance:0,

totalEarn:0,

referral:0

});

}

const updatedSnap =
await getDoc(userRef);

const data =
updatedSnap.data();

document.getElementById("balance")
.innerHTML =
"PKR " + data.balance;

document.getElementById("earn")
.innerHTML =
"PKR " + data.totalEarn;

document.getElementById("referral")
.innerHTML =
data.referral;

}else{

window.location.href =
"login.html";

}

});

</script>

</body>

</html>
